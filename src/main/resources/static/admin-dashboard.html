<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    
    <div class="navbar">

        <div class="logo">
            TurfBook
        </div>

        <div>
            <a href="index.html">Home</a>
            
        </div>

    </div>

   
    <div class="container">

        <h2>Admin Dashboard</h2>

       
        <div class="stats">

            <div class="stat-card">
                <h3 id="totalBookings">0</h3>
                <p>Total Bookings</p>
            </div>

            <div class="stat-card">
                <h3 id="paidBookings">0</h3>
                <p>Paid Bookings</p>
            </div>

            <div class="stat-card">
                <h3 id="pendingBookings">0</h3>
                <p>Pending Bookings</p>
            </div>

        </div>

        
        <button class="btn" onclick="loadBookings()">
            Load All Bookings
        </button>

        <br><br>

        
        <div id="result"></div>

    </div>

    
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>

    <script>
        loadBookings();
    </script>

</body>
</html>
